%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters for HKisland Dataset
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV) 
Camera.fx: 1444.43
Camera.fy: 1444.34
Camera.cx: 1177.80
Camera.cy: 1043.60

Camera.k1: -0.0530
Camera.k2: 0.1210
Camera.p1: 0.00127
Camera.p2: 0.00043
Camera.k3: -0.06495

# Camera resolution
Camera.width: 2448
Camera.height: 2048

# Camera frames per second 
Camera.fps: 10

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Transformation from camera to body-frame (imu)
Tbc: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [0.00352762,-0.999765,-0.0213775, -0.0025563,
         -0.0111803,0.0213369,-0.99971, 0.0470454,
         0.999931,0.00376561,-0.0111025,  -0.0513375,
         0.0, 0.0, 0.0, 1.0]

# IMU noise
IMU.NoiseGyro: 2.44e-4 #1.6968e-04 
IMU.NoiseAcc: 2.255e-3 #2.0e-3
IMU.GyroWalk: 4.0e-05 
IMU.AccWalk: 2.0e-03 # 3e-03
IMU.Frequency: 200

# IMU.NoiseGyro: 1.0e-04 #1.6968e-04 
# IMU.NoiseAcc: 1.0e-03 #2.0e-3
# IMU.GyroWalk: 1.0e-05
# IMU.AccWalk: 1.0e-04 # 3e-03
# IMU.Frequency: 400

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 13000

# ORB Extractor: Scale factor between levels in the scale pyramid 	
ORBextractor.scaleFactor: 1.32

# ORB Extractor: Number of levels in the scale pyramid	
ORBextractor.nLevels: 15

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast			
ORBextractor.iniThFAST: 13
ORBextractor.minThFAST: 3

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0


